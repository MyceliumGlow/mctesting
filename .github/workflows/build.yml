name: Mod Builder
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Force Install Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate the Missing Wrapper
        run: gradle wrapper

      - name: Make Wrapper Executable
        run: chmod +x gradlew

      - name: Build the Mod
        run: ./gradlew build

      - name: Upload Finished Mod
        uses: actions/upload-artifact@v4
        with:
          name: PsychDisturb-Jar
          path: build/libs/*.jar
